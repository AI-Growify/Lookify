[build]
  publish = "public"
  functions = "netlify/functions"

[functions]
  node_bundler = "nft"
  included_files = [
    "views/**",
    "config/**",
    "routes/**",
    "controllers/**",
    "models/**",
    "public/**"
  ]

# Route everything that isn't a static file through the Express function
[[redirects]]
  from = "/*"
  to = "/.netlify/functions/server/:splat"
  status = 200
  force = false
